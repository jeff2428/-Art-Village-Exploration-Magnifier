name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'admin/**'
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'admin/**'
      - 'docs/**'
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: flet_app/package-lock.json

      - name: Install frontend dependencies
        working-directory: flet_app
        run: npm ci

      - name: Lint frontend
        working-directory: flet_app
        run: npm run lint

      - name: Test frontend
        working-directory: flet_app
        run: npm test

      - name: Build frontend
        working-directory: flet_app
        env:
          VITE_API_URL: https://example.invalid
        run: npm run build

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Syntax check worker
        run: node --check worker/index.js

      - name: Run Worker security tests
        run: python -m unittest tests.test_worker_security -v
